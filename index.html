<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3 Things I Want From You...</title>
    <style>
        :root {
            /* This matches the exact pure white background of the original images */
            --bg-color: #ffffff;
            --primary-color: #ff8da1;
            --text-color: #000000;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow-x: hidden;
        }

        .container {
            width: 100%;
            max-width: 450px;
            padding: 20px;
            box-sizing: border-box;
            text-align: center;
        }

        .slide {
            display: none;
            animation: fadeIn 0.4s ease-out forwards;
        }

        .slide.active {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        /* This crops out the top status bar and bottom navigation from the phone screenshots */
        .img-wrapper {
            width: 100%;
            height: 62vh;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 30px;
        }

        .img-wrapper img {
            width: 100%;
            height: 140%; /* Scale up slightly to push phone interface out of view */
            object-fit: cover;
            object-position: center 45%; /* Centers the cartoon and text perfectly */
        }

        /* Special adjustment for the long 100-list slide so it's fully scrollable */
        #slide5 .img-wrapper {
            height: auto;
            max-height: 75vh;
            overflow-y: auto;
            align-items: flex-start;
        }
        
        #slide5 .img-wrapper img {
            height: auto;
            object-fit: contain;
        }

        .btn-container {
            height: 60px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .btn {
            background-color: var(--primary-color);
            color: white;
            border: none;
            padding: 14px 40px;
            font-size: 16px;
            font-weight: 600;
            border-radius: 30px;
            cursor: pointer;
            box-shadow: 0 4px 12px rgba(255, 141, 161, 0.3);
            transition: transform 0.1s, background-color 0.2s;
            -webkit-tap-highlight-color: transparent;
        }

        .btn:active {
            transform: scale(0.96);
            background-color: #ff768e;
        }

        .final-text {
            font-size: 18px;
            font-weight: bold;
            color: #ff5271;
            margin-top: 15px;
            animation: heartbeat 1.2s infinite;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        @keyframes heartbeat {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }
    </style>
</head>
<body>

<audio id="bg-music" src="music.mp3" loop></audio> 

<div class="container">
    <div class="slide active" id="slide1">
        <div class="img-wrapper">
            <img src="image.png" alt="3 things I want from you">
        </div>
        <div class="btn-container">
            <button class="btn" onclick="nextSlide(2)">What are they? 🤔</button>
        </div>
    </div>

    <div class="slide" id="slide2">
        <div class="img-wrapper">
            <img src="image_2.png" alt="1. a hug">
        </div>
        <div class="btn-container">
            <button class="btn" onclick="nextSlide(3)">Next... 👀</button>
        </div>
    </div>

    <div class="slide" id="slide3">
        <div class="img-wrapper">
            <img src="image_3.png" alt="2. a kiss">
        </div>
        <div class="btn-container">
            <button class="btn" onclick="nextSlide(4)">And the 3rd? Last one?</button>
        </div>
    </div>

    <div class="slide" id="slide4">
        <div class="img-wrapper">
            <img src="image_4.png" alt="hah you thought only 3?">
        </div>
        <div class="btn-container">
            <button class="btn" onclick="nextSlide(5)">Wait, what?! 😳</button>
        </div>
    </div>

    <div class="slide" id="slide5">
        <div class="img-wrapper">
            <img src="image_5.png" alt="The 100 list">
        </div>
        <div class="final-text">I want everything from you. Always. ❤️</div>
    </div>
</div>

<script>
    function nextSlide(slideNumber) {
        const slides = document.querySelectorAll('.slide');
        slides.forEach(slide => slide.classList.remove('active'));
        
        const targetSlide = document.getElementById('slide' + slideNumber);
        if (targetSlide) {
            targetSlide.classList.add('active');
            // Instantly scrolls back to top if the container shifted
            window.scrollTo(0, 0);
        }
    }
</script>

</body>
</html>
